name: Publish Docker images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example, 2.0.3)
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Frontend
            image: frontend
            repository: fantetic-terminal-frontend
            dockerfile: packages/frontend/Dockerfile
          - name: Backend
            image: backend
            repository: fantetic-terminal-backend
            dockerfile: packages/backend/Dockerfile
          - name: Remote gateway
            image: remote-gateway
            repository: fantetic-terminal-remote-gateway
            dockerfile: packages/remote-gateway/Dockerfile
          - name: All-in-one
            image: all-in-one
            repository: fantetic-terminal
            dockerfile: packages/single-image/Dockerfile

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        shell: bash
        run: |
          if ! [[ "$RELEASE_VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo '::error::Release version must use semantic versioning, for example 2.0.3 or v2.0.3.'
            exit 1
          fi

      - name: Validate Docker Hub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo '::error::Configure DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets before publishing images.'
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
            type=raw,value=latest

      - name: Build and push multi-architecture image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
