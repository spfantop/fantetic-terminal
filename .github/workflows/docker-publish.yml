name: Publish Docker images

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Frontend
            image: frontend
            dockerfile: packages/frontend/Dockerfile
          - name: Backend
            image: backend
            dockerfile: packages/backend/Dockerfile
          - name: Remote gateway
            image: remote-gateway
            dockerfile: packages/remote-gateway/Dockerfile

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Docker Hub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo '::error::Configure DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets before publishing images.'
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/fantetic-terminal-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push multi-architecture image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Remove obsolete Docker Hub tags
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_NAME: fantetic-terminal-${{ matrix.image }}
          RELEASE_VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          release_version="${RELEASE_VERSION#v}"
          login_payload="$(jq -cn --arg username "$DOCKERHUB_USERNAME" --arg password "$DOCKERHUB_TOKEN" '{username: $username, password: $password}')"
          api_token="$(curl --fail --silent --show-error \
            --header 'Content-Type: application/json' \
            --data "$login_payload" \
            https://hub.docker.com/v2/users/login/ | jq -r '.token // empty')"

          if [ -z "$api_token" ]; then
            echo '::error::Docker Hub did not return an API token for tag cleanup.'
            exit 1
          fi

          tags_api_url="https://hub.docker.com/v2/namespaces/$DOCKERHUB_USERNAME/repositories/$IMAGE_NAME/tags"
          tag_names="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer $api_token" \
            "$tags_api_url?page_size=100" | jq -r '.results[]?.name')"

          while IFS= read -r tag; do
            if [ -z "$tag" ] || [ "$tag" = "$release_version" ] || [ "$tag" = 'latest' ]; then
              continue
            fi

            echo "Removing obsolete Docker Hub tag: $tag"
            curl --fail --silent --show-error --request DELETE \
              --header "Authorization: Bearer $api_token" \
              "$tags_api_url/$tag"
          done <<< "$tag_names"
