name: Quality checks

on:
  pull_request:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependency locks
        run: |
          npm audit --audit-level=high
          npm audit --prefix electron-app --package-lock-only --audit-level=high

      - name: Run full behavior suite
        run: npm test

      - name: Build all runtime packages
        run: |
          npm run build --workspace=@fantetic-terminal/backend
          npm run build --workspace=@fantetic-terminal/frontend
          npm run build --workspace=@fantetic-terminal/remote-gateway
