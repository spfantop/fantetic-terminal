name: Build desktop applications

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to create/update (for example v1.5.2)
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            command: build:windows
            artifact: windows-x64
            files: |
              electron-app/dist_electron/*.exe
              electron-app/dist_electron/*.zip
          - name: Linux x64
            os: ubuntu-latest
            command: build:linux
            artifact: linux-x64
            files: |
              electron-app/dist_electron/*.AppImage
              electron-app/dist_electron/*.deb
          - name: macOS x64
            os: macos-15-intel
            command: build:macos:x64
            artifact: macos-x64
            files: |
              electron-app/dist_electron/*.dmg
          - name: macOS arm64
            os: macos-latest
            command: build:macos:arm64
            artifact: macos-arm64
            files: |
              electron-app/dist_electron/*.dmg

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            electron-app/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Install Electron dependencies
        run: npm ci --prefix electron-app

      - name: Validate Electron packaging behavior
        run: npm run test:behavior --prefix electron-app

      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
        run: node build-tools/validate-release-version.js

      - name: Report optional signing and notarization configuration
        if: ${{ (github.ref_type == 'tag' || inputs.release_tag != '') && (runner.os == 'Windows' || runner.os == 'macOS') }}
        env:
          SIGNING_CSC_LINK: ${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_LINK || runner.os == 'macOS' && secrets.MACOS_CSC_LINK || '' }}
          SIGNING_CSC_KEY_PASSWORD: ${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_KEY_PASSWORD || runner.os == 'macOS' && secrets.MACOS_CSC_KEY_PASSWORD || '' }}
          APPLE_API_KEY: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_ID: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ runner.os == 'macOS' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        shell: pwsh
        run: |
          if ($env:SIGNING_CSC_LINK -and $env:SIGNING_CSC_KEY_PASSWORD) {
            Write-Host 'Desktop code signing is enabled for this release.'
          } else {
            Write-Warning 'Code-signing credentials are not configured; publishing unsigned desktop artifacts.'
          }
          if ('${{ runner.os }}' -eq 'macOS' -and (-not $env:APPLE_API_KEY -or -not $env:APPLE_API_KEY_ID -or -not $env:APPLE_API_ISSUER -or -not $env:APPLE_TEAM_ID)) {
            Write-Warning 'macOS notarization credentials are not configured; publishing an unsigned, unnotarized macOS artifact.'
          }

      - name: Build backend
        run: npm run build --workspace=@fantetic-terminal/backend

      - name: Build frontend
        env:
          VITE_FANTETIC_APP_MODE: electron
        run: npm run build --workspace=@fantetic-terminal/frontend

      - name: Package desktop application
        env:
          SIGNING_CSC_LINK: ${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_LINK || runner.os == 'macOS' && secrets.MACOS_CSC_LINK || '' }}
          SIGNING_CSC_KEY_PASSWORD: ${{ runner.os == 'Windows' && secrets.WINDOWS_CSC_KEY_PASSWORD || runner.os == 'macOS' && secrets.MACOS_CSC_KEY_PASSWORD || '' }}
          APPLE_API_KEY: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_KEY_ID: ${{ runner.os == 'macOS' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ runner.os == 'macOS' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        shell: pwsh
        run: |
          if ($env:SIGNING_CSC_LINK -and $env:SIGNING_CSC_KEY_PASSWORD) {
            $env:CSC_LINK = $env:SIGNING_CSC_LINK
            $env:CSC_KEY_PASSWORD = $env:SIGNING_CSC_KEY_PASSWORD
          } else {
            Write-Warning 'Building unsigned desktop artifact because signing credentials are incomplete or absent.'
          }
          $maxPackagingAttempts = if ('${{ runner.os }}' -eq 'macOS') { 2 } else { 1 }
          $packagingExitCode = 1
          for ($attempt = 1; $attempt -le $maxPackagingAttempts; $attempt += 1) {
            npm run ${{ matrix.command }} --prefix electron-app
            $packagingExitCode = $LASTEXITCODE
            if ($packagingExitCode -eq 0) {
              break
            }
            if ($attempt -eq $maxPackagingAttempts) {
              break
            }
            Write-Host "macOS DMG packaging failed; cleaning stale Fantetic Terminal disk images before retry."
            bash electron-app/build-tools/cleanup-dmg-mounts.sh
            Start-Sleep -Seconds 10
          }
          exit $packagingExitCode

      - name: Upload desktop packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fantetic-terminal-${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release assets
    needs: build-desktop
    if: ${{ github.ref_type == 'tag' || inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all desktop packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: fantetic-terminal-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256 checksums
        shell: bash
        run: find release-assets -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > release-assets/SHA256SUMS.txt

      - name: Verify release checksums
        shell: bash
        working-directory: release-assets
        run: sha256sum --check SHA256SUMS.txt

      - name: Create release and upload Assets
        uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.exe
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.dmg
            release-assets/SHA256SUMS.txt
