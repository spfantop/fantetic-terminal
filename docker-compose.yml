services:
  frontend:
    image: spfantop/fantetic-terminal-frontend:latest
    container_name: fantetic-terminal-frontend
    ports:
      - "18111:80"
    depends_on:
      - backend
      - remote-gateway
    networks:
      - fantetic-terminal-network

  backend:
    image: spfantop/fantetic-terminal-backend:latest
    container_name: fantetic-terminal-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DEPLOYMENT_MODE: "${DEPLOYMENT_MODE:-docker}"
      REMOTE_GATEWAY_API_BASE_LOCAL: "${REMOTE_GATEWAY_API_BASE_LOCAL:-http://localhost:9090}"
      REMOTE_GATEWAY_API_BASE_DOCKER: "${REMOTE_GATEWAY_API_BASE_DOCKER:-http://remote-gateway:9090}"
      REMOTE_GATEWAY_WS_URL_LOCAL: "${REMOTE_GATEWAY_WS_URL_LOCAL:-ws://localhost:8080}"
      REMOTE_GATEWAY_WS_URL_DOCKER: "${REMOTE_GATEWAY_WS_URL_DOCKER:-ws://remote-gateway:8081}"
      RP_ID: "${RP_ID:-localhost}"
      RP_ORIGIN: "${RP_ORIGIN:-http://localhost:18111}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
    volumes:
      - ./data:/app/data
    networks:
      - fantetic-terminal-network

  remote-gateway:
    image: spfantop/fantetic-terminal-remote-gateway:latest
    container_name: fantetic-terminal-remote-gateway
    environment:
      GUACD_HOST: localhost
      GUACD_PORT: 4822
      REMOTE_GATEWAY_API_PORT: 9090
      REMOTE_GATEWAY_WS_PORT: 8081
      FRONTEND_URL: http://frontend
      MAIN_BACKEND_URL: http://backend:3001
      NODE_ENV: production
    networks:
      - fantetic-terminal-network
    depends_on:
      - backend

networks:
  fantetic-terminal-network:
    driver: bridge
    name: fantetic-terminal-network
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd01::/80    
          gateway: fd01::1    
